<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    :root {
      --blue: #0f62fe; --dark: #161616; --g90: #262626; --g80: #393939;
      --g20: #dde1e6; --white: #fff; --green: #198038; --yellow: #f1c21b;
      --red: #da1e28; --font: 'IBM Plex Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--dark); color: var(--white); width: 280px; padding: 1rem; }

    .header { display: flex; align-items: center; gap: .5rem; margin-bottom: 1rem; }
    .header .ibm { font-size: .875rem; font-weight: 700; color: var(--blue); }
    .header .product { font-size: .75rem; color: #a8b2bd; }
    .header .div { width: 1px; height: 14px; background: var(--g80); }

    .source { display: flex; align-items: center; gap: .625rem; padding: .625rem 0; border-bottom: 1px solid var(--g80); }
    .source:last-child { border-bottom: none; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.ok { background: var(--green); }
    .dot.warn { background: var(--yellow); }
    .dot.off { background: var(--g80); }
    .source-info { flex: 1; }
    .source-name { font-size: .8125rem; font-weight: 600; }
    .source-detail { font-size: .6875rem; color: #6f7880; margin-top: .1rem; }

    .hint { font-size: .6875rem; color: #6f7880; margin-top: .875rem; line-height: 1.5; }
    a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="ibm">IBM</span>
    <div class="div"></div>
    <span class="product">SkillsPath</span>
  </div>

  <div id="sources">
    <div class="source">
      <div class="dot warn" id="dot-canvas"></div>
      <div class="source-info">
        <div class="source-name">Canvas LMS</div>
        <div class="source-detail" id="detail-canvas">Waiting for Canvas page…</div>
      </div>
    </div>
    <div class="source">
      <div class="dot warn" id="dot-sb"></div>
      <div class="source-info">
        <div class="source-name">IBM SkillsBuild</div>
        <div class="source-detail" id="detail-sb">Waiting for SkillsBuild page…</div>
      </div>
    </div>
  </div>

  <div class="hint">
    Open <a href="https://canvas.instructure.com" target="_blank">Canvas</a> and
    <a href="https://skills.yourlearning.ibm.com" target="_blank">SkillsBuild</a> in your browser to sync data.
  </div>

  <script src="popup.js"></script>
</body>
</html>
